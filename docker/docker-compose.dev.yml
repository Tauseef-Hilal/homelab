name: homelab-dev

services:
  migrate:
    build:
      context: ..
      dockerfile: ./apps/api/docker/Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env.development
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: sh -c "
      pnpm --filter @homelab/db exec prisma migrate deploy &&
      pnpm --filter @homelab/db exec prisma generate
      "

  server:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/api/docker/Dockerfile.dev
      target: dev
    ports:
      - "5001:5001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - ../.env.development
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: pnpm --filter @homelab/api dev

  thumbnail-worker:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/workers/docker/Dockerfile.thumbnail.dev
      target: dev
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - ../.env.development
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - workers_node_modules:/app/apps/workers/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: pnpm --filter @homelab/workers dev:thumbnail

  io-workers:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/workers/docker/Dockerfile.io.dev
      target: dev
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - ../.env.development
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - workers_node_modules:/app/apps/workers/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: pnpm --filter @homelab/workers dev:io

  client:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/web/docker/Dockerfile.dev
      target: dev
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_started
    env_file:
      - ../.env.development
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: pnpm --filter @homelab/web dev

  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:

  node_modules:
  api_node_modules:
  workers_node_modules:
  web_node_modules:

  pnpm_store:
