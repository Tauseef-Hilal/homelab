name: homelab-prod

services:
  # ------------------------
  # Prisma Migration Runner
  # ------------------------
  migrate:
    build:
      context: ..
      dockerfile: ./apps/api/docker/Dockerfile.prod
      target: prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env.production
    command: >
      sh -c "
        pnpm --filter @homelab/db exec prisma migrate deploy
      "
    restart: "no"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # Backend API Server
  # ------------------------
  server:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/api/docker/Dockerfile.prod
      target: prod
    ports:
      - "5001:5001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    volumes:
      - ../data:/app/data
    command: pnpm --filter @homelab/api run start
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # Thumbnail Worker
  # ------------------------
  thumbnail-worker:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/workers/docker/Dockerfile.thumbnail.prod
      target: prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    volumes:
      - ../data:/app/data
    command: pnpm --filter @homelab/workers run start:thumbnail
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # IO Worker
  # ------------------------
  io-workers:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/workers/docker/Dockerfile.io.prod
      target: prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    volumes:
      - ../data:/app/data
    command: pnpm --filter @homelab/workers run start:io
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # Frontend Client
  # ------------------------
  client:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: ./apps/web/docker/Dockerfile.prod
      target: prod
      network: host
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env.production
    volumes:
      - ../data:/app/data
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # PostgreSQL Database
  # ------------------------
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ../.env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # ------------------------
  # Redis
  # ------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4

# ------------------------
# Persistent Volumes
# ------------------------
volumes:
  pgdata:
  redisdata:
